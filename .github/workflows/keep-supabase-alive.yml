name: Keep Supabase Alive

on:
  schedule:
    # Corre cada 3 días a las 12:00 UTC
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Supabase para mantenerlo activo
        run: |
          echo "🏓 Haciendo ping a Supabase..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://feookjimftquqkwhgwfj.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlb29ramltZnRxdXFrd2hnd2ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NjI0MTcsImV4cCI6MjA4NjIzODQxN30.oR22_B7m_cofPUkgjdNR2ai-NZB-tCi0M_WIj2Z3oaM" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlb29ramltZnRxdXFrd2hnd2ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NjI0MTcsImV4cCI6MjA4NjIzODQxN30.oR22_B7m_cofPUkgjdNR2ai-NZB-tCi0M_WIj2Z3oaM")
          
          echo "📡 Response code: $RESPONSE"
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase está activo y respondiendo correctamente"
            echo "🎂 Academia Chef Rondón mantenida activa"
          else
            echo "❌ Supabase respondió con código: $RESPONSE"
            exit 1
          fi